<div class="app-shell" [class.menu-open]="menuOpen()">
  <header class="site-header">
    <div class="container d-flex flex-column flex-lg-row align-items-lg-center justify-content-between">
      <a class="brand" routerLink="/" aria-label="Asilbek Hotel home">
        <span class="brand-mark">AH</span>
        <span class="brand-copy">
          <strong>{{ title() }}</strong>
          <small>Booking dashboard</small>
        </span>
      </a>
      <button class="nav-toggle" type="button" aria-label="Toggle navigation" [attr.aria-expanded]="menuOpen()" (click)="toggleMenu()" [class.open]="menuOpen()">
        <span class="bar"></span>
        <span class="bar"></span>
        <span class="bar"></span>
      </button>

      <nav class="site-nav" aria-label="Primary" [class.open]="menuOpen()">
        <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" (click)="closeMenu()">Home</a>
        <a routerLink="/new" routerLinkActive="active" (click)="closeMenu()">New booking</a>
        <a routerLink="/list" routerLinkActive="active" (click)="closeMenu()">Room list</a>
      </nav>

      <a class="btn btn-primary btn-sm" routerLink="/new" (click)="closeMenu()">Create booking</a>
    </div>
  </header>

  <div class="nav-backdrop" *ngIf="menuOpen()" (click)="closeMenu()" [class.open]="menuOpen()"></div>

  <main class="page-stack">
    <div class="container">
      <router-outlet></router-outlet>
    </div>
  </main>

  <footer class="container site-footer">
    <span>Simple hotel booking project built with Angular.</span>
    <span>Clean forms, local storage, polished UI.</span>
  </footer>
</div>
